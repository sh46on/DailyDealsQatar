<!doctype html>

<html lang="en">
<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->

  <title>Daily Deals Qatar | Best Offers & Discounts</title>

  <!-- SEO -->

  <meta name="description" content="Discover the best daily deals, discounts, and offers in Qatar. Save on supermarkets, restaurants, fashion, and more." />
  <meta name="keywords" content="Qatar deals, daily offers, discounts, supermarket deals, restaurant offers, Qatar shopping" />
  <meta name="author" content="Daily Deals Qatar" />
  <link rel="canonical" href="https://dailydealsqatar.com/" />

  <!-- Open Graph -->

  <meta property="og:title" content="Daily Deals Qatar" />
  <meta property="og:description" content="Find the best daily deals and discounts in Qatar." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dailydealsqatar.com/" />
  <meta property="og:image" content="/preview.png" />

  <!-- Twitter -->

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Daily Deals Qatar" />
  <meta name="twitter:description" content="Explore the latest offers and discounts in Qatar." />
  <meta name="twitter:image" content="/preview.png" />

  <!-- Theme -->

  <meta name="theme-color" content="#7f1d1d" />

  <!-- Favicon -->

  <link rel="icon" type="image/svg+xml" href="/logo.svg" />

  <!-- PWA -->

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Fonts (single source only) -->

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@300,400,500,700,800&f[]=clash-display@400,500,600,700&display=swap" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

  <!-- Structured Data -->

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Daily Deals Qatar",
    "url": "https://dailydealsqatar.com",
    "description": "Find the best daily deals and discounts in Qatar.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://dailydealsqatar.com/search?q={search_term}",
      "query-input": "required name=search_term"
    }
  }
  </script>

</head>

<body>
  <div id="root"></div>

  <!-- React App -->

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
